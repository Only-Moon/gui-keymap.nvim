on:
  push:
    branches:
      - master
name: docs

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: panvimdoc
        uses: kdheepak/panvimdoc@main
        with:
          vimdoc: gui-keymap
          version: "Neovim >= 0.8.0"
          demojify: true
          treesitter: true
